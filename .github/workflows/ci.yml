name: Workflow deployment for nAPPing

on: [push, workflow_dispatch]

jobs:
  build:
    name: Build de production
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: napping

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: napping/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Build React CSR
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_URL: /nAPPing/

      - name: Upload des artefacts de build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: napping/dist/
          retention-days: 7

  deploy:
    name: Déploiement GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Télécharger les artefacts de build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload vers GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
